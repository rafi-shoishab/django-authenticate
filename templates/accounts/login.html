{% extends 'base.html' %}

{% block title %}
  Log in
{% endblock %}

{% block content %}
  <div class="flex justify-center">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
      <h2 class="text-2xl font-bold mb-6 text-center">Login</h2>

      <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        <div class="mb-4">
          <label class="block text-gray-700 mb-1">email or username</label>
          <input type="text" name="username_or_email" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="email or username" />
        </div>

        <div class="mb-4">
          <label class="block text-gray-700 mb-1">Password</label>
          <input type="password" name="password" class="w-full px-4 py-2 border rounded focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="enter password" />
        </div>

        <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded hover:bg-blue-700">Login</button>
      </form>

      <p class="text-center text-sm mt-4">
        Don't have an account?
        <a href="{% url 'register' %}" class="text-blue-600 hover:underline">Sign Up</a>
      </p>
    </div>
  </div>
{% endblock %}
